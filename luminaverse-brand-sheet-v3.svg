<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" role="img" aria-label="LuminaVerse logo system">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;family=Cairo:wght@600;700&amp;display=swap');
      text{font-family:'Outfit','Segoe UI',system-ui,sans-serif;}
      .ar{font-family:'Cairo','Segoe UI',sans-serif;}
      .cap{fill:#15332a;opacity:.5;font-weight:500;letter-spacing:1.5px;}
      .lbl{fill:#15332a;opacity:.55;}
    </style>

    <radialGradient id="core" cx="38%" cy="34%" r="72%">
      <stop offset="0" stop-color="#D6F7E7"/>
      <stop offset="0.42" stop-color="#54CBA0"/>
      <stop offset="1" stop-color="#1B9A71"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#1D9E75" stop-opacity="0.20"/>
      <stop offset="0.65" stop-color="#1D9E75" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sg" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#E6FCF2" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#7FDCB6" stop-opacity="0"/>
    </radialGradient>

    <g id="markC">
      <circle cx="20" cy="24" r="1.4" fill="#4FC79B" opacity="0.5"/>
      <circle cx="30" cy="71" r="1.1" fill="#4FC79B" opacity="0.4"/>
      <circle cx="69" cy="74" r="1.2" fill="#4FC79B" opacity="0.4"/>
      <circle cx="50" cy="50" r="40" fill="url(#halo)"/>
      <ellipse cx="50" cy="50" rx="42" ry="16" transform="rotate(-22 50 50)"
               fill="none" stroke="#1D9E75" stroke-width="2.4" stroke-opacity="0.55"
               vector-effect="non-scaling-stroke"/>
      <circle cx="50" cy="50" r="21" fill="url(#core)"/>
      <circle cx="50" cy="50" r="21" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
      <circle cx="79" cy="31" r="9.5" fill="url(#sg)"/>
      <circle cx="79" cy="31" r="4.8" fill="#EAFCF4"/>
      <circle cx="77.4" cy="29.5" r="1.7" fill="#ffffff"/>
    </g>

    <g id="markM">
      <ellipse cx="50" cy="50" rx="42" ry="16" transform="rotate(-22 50 50)"
               fill="none" stroke="currentColor" stroke-width="2.6" stroke-opacity="0.55"
               vector-effect="non-scaling-stroke"/>
      <circle cx="50" cy="50" r="21" fill="currentColor"/>
      <circle cx="79" cy="31" r="4.8" fill="currentColor"/>
    </g>
  </defs>

  <rect width="900" height="560" fill="#f7faf8"/>

  <text x="40" y="46" class="cap" font-size="12" letter-spacing="2px">LUMINAVERSE<tspan opacity="0.7" font-weight="400" letter-spacing="1px"> · LOGO SYSTEM v3</tspan></text>

  <!-- favicon scaling -->
  <text x="760" y="72" class="cap" font-size="10">FAVICON · SCALES</text>
  <use href="#markC" transform="translate(760 82) scale(0.40)"/>
  <use href="#markC" transform="translate(812 92) scale(0.28)"/>
  <use href="#markC" transform="translate(852 98) scale(0.18)"/>
  <text x="780" y="140" class="lbl" font-size="9" text-anchor="middle">40</text>
  <text x="826" y="140" class="lbl" font-size="9" text-anchor="middle">28</text>
  <text x="861" y="140" class="lbl" font-size="9" text-anchor="middle">18</text>

  <!-- clean hero lockup: mark + wordmark only -->
  <use href="#markC" transform="translate(40 84) scale(0.95)"/>
  <text x="150" y="151" font-size="44" font-weight="600" letter-spacing="-0.5"><tspan fill="#15332a">Lumina</tspan><tspan fill="#1D9E75">Verse</tspan></text>

  <line x1="40" y1="192" x2="860" y2="192" stroke="#d8e7df" stroke-width="1.5"/>

  <!-- usage notes -->
  <text x="40" y="216" class="cap" font-size="10" letter-spacing="2px">USAGE</text>

  <text x="40" y="242" class="cap" font-size="10">POSITIONING — LIVE TEXT (landing hero · email · ads)</text>
  <text x="50" y="269" class="ar" font-size="18" fill="#15332a" style="direction:rtl">جامعتك الشخصية من يوتيوب</text>
  <text x="50" y="290" class="lbl" font-size="12.5">Transform YouTube into your personal university</text>

  <text x="40" y="324" class="cap" font-size="10">NAME ORIGIN — REFERENCE ONLY (brand book · about page)</text>
  <text x="50" y="349" class="lbl" font-size="13.5">Lumina  =  نور  ·  light</text>
  <text x="50" y="369" class="lbl" font-size="13.5">Verse  =  كون  ·  universe</text>

  <line x1="40" y1="388" x2="860" y2="388" stroke="#d8e7df" stroke-width="1.5"/>

  <!-- mark variations -->
  <text x="40" y="412" class="cap" font-size="10">MARK</text>
  <text x="470" y="412" class="cap" font-size="10">ON DARK</text>

  <rect x="40" y="424" width="120" height="104" rx="12" fill="#ffffff" stroke="#d8e7df"/>
  <use href="#markC" transform="translate(61 437) scale(0.78)"/>
  <rect x="172" y="424" width="120" height="104" rx="12" fill="#ffffff" stroke="#d8e7df"/>
  <g style="color:#15332a"><use href="#markM" transform="translate(193 437) scale(0.78)"/></g>
  <rect x="304" y="424" width="120" height="104" rx="12" fill="#15332a"/>
  <g style="color:#f7faf8"><use href="#markM" transform="translate(325 437) scale(0.78)"/></g>

  <rect x="470" y="424" width="390" height="104" rx="14" fill="#15332a"/>
  <use href="#markC" transform="translate(484 445) scale(0.62)"/>
  <text x="556" y="485" font-size="26" font-weight="600" letter-spacing="-0.5"><tspan fill="#f7faf8">Lumina</tspan><tspan fill="#4FC79B">Verse</tspan></text>

  <text x="100" y="548" class="lbl" font-size="11.5" text-anchor="middle">Colour</text>
  <text x="232" y="548" class="lbl" font-size="11.5" text-anchor="middle">Mono</text>
  <text x="364" y="548" class="lbl" font-size="11.5" text-anchor="middle">Reversed</text>
</svg>
