<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b4034"/>
      <stop offset="1" stop-color="#0e1c16"/>
    </linearGradient>
    <radialGradient id="bigGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2bbd8a" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#1D9E75" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="core" cx="38%" cy="34%" r="72%">
      <stop offset="0" stop-color="#E2FAEE"/>
      <stop offset="0.42" stop-color="#5CD2A8"/>
      <stop offset="1" stop-color="#1B9A71"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#3BD79E" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#1D9E75" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#1D9E75" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sg" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#EAFCF4" stop-opacity="1"/>
      <stop offset="1" stop-color="#7FDCB6" stop-opacity="0"/>
    </radialGradient>

    <g id="mark">
      <circle cx="50" cy="50" r="46" fill="url(#halo)"/>
      <ellipse cx="50" cy="50" rx="42" ry="16" transform="rotate(-22 50 50)"
               fill="none" stroke="#5FD3A9" stroke-width="2.6" stroke-opacity="0.7"
               vector-effect="non-scaling-stroke"/>
      <circle cx="50" cy="50" r="21" fill="url(#core)"/>
      <circle cx="50" cy="50" r="21" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>
      <circle cx="79" cy="31" r="10" fill="url(#sg)"/>
      <circle cx="79" cy="31" r="5" fill="#EAFCF4"/>
      <circle cx="77.3" cy="29.4" r="1.8" fill="#ffffff"/>
    </g>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="240" rx="640" ry="430" fill="url(#bigGlow)"/>

  <!-- starfield -->
  <g fill="#bfeedd">
    <circle cx="120" cy="90" r="2" opacity="0.5"/>
    <circle cx="240" cy="160" r="1.4" opacity="0.4"/>
    <circle cx="80" cy="300" r="1.6" opacity="0.35"/>
    <circle cx="180" cy="470" r="2" opacity="0.45"/>
    <circle cx="310" cy="540" r="1.3" opacity="0.35"/>
    <circle cx="500" cy="110" r="1.5" opacity="0.4"/>
    <circle cx="980" cy="120" r="2" opacity="0.5"/>
    <circle cx="1080" cy="220" r="1.5" opacity="0.4"/>
    <circle cx="1120" cy="400" r="1.8" opacity="0.4"/>
    <circle cx="1010" cy="510" r="1.4" opacity="0.35"/>
    <circle cx="880" cy="560" r="1.6" opacity="0.4"/>
    <circle cx="700" cy="540" r="1.3" opacity="0.3"/>
    <circle cx="1150" cy="90" r="1.4" opacity="0.4"/>
    <circle cx="60" cy="180" r="1.3" opacity="0.35"/>
  </g>

  <!-- lockup: mark + wordmark -->
  <use href="#mark" transform="translate(398 96) scale(0.84)"/>
  <text x="496" y="167" font-family="Outfit" font-size="46" font-weight="600" letter-spacing="-0.5"><tspan fill="#f7faf8">Lumina</tspan><tspan fill="#4FC79B">Verse</tspan></text>

  <!-- headline (value) -->
  <text x="600" y="346" text-anchor="middle" font-family="Cairo" font-size="68" font-weight="700" fill="#f7faf8">جامعتك الشخصية من يوتيوب</text>

  <!-- subline -->
  <text x="600" y="410" text-anchor="middle" font-family="Cairo" font-size="34" font-weight="600" fill="#7FD9B4">حوّل كل فيديو إلى خطة عمل قابلة للتنفيذ</text>

  <!-- 3 pillars -->
  <text x="600" y="476" text-anchor="middle" font-family="Cairo" font-size="25" font-weight="600" fill="#f7faf8" opacity="0.72" xml:space="preserve">ملاحظة<tspan fill="#4FC79B">    ·    </tspan>سؤال<tspan fill="#4FC79B">    ·    </tspan>تطبيق</text>

  <!-- domain -->
  <text x="600" y="566" text-anchor="middle" font-family="Outfit" font-size="27" font-weight="600" letter-spacing="1" fill="#4FC79B">luminaverse.app</text>
</svg>
